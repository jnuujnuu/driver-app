<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เช็คระยะทางคนขับ (Pro)</title>
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า React และ ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- นำเข้า Babel สำหรับแปลง JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- นำเข้า Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- นำเข้าระบบแผนที่ (Leaflet) เพิ่มเติมตรงนี้ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- เริ่มต้นส่วนของแอปพลิเคชัน ---
        const { useState, useEffect } = React;

        function App() {
            const [currentLocation, setCurrentLocation] = useState(null);
            const [locationError, setLocationError] = useState('');
            const [isLocating, setIsLocating] = useState(true);

            const [searchQuery, setSearchQuery] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [searchResults, setSearchResults] = useState([]);
            const [searchMessage, setSearchMessage] = useState(''); // เพิ่มตัวแปรเก็บข้อความแจ้งเตือน
            
            const [selectedDest, setSelectedDest] = useState(null);
            const [routeInfo, setRouteInfo] = useState(null);
            const [isCalculating, setIsCalculating] = useState(false);

            // --- ตัวแปรสำหรับคุมหน้าต่างแผนที่ ---
            const [showMap, setShowMap] = useState(false);
            const mapContainerRef = React.useRef(null);
            const selectedLatLngRef = React.useRef(null);

            useEffect(() => {
                lucide.createIcons();
            });

            const getUserLocation = () => {
                setIsLocating(true);
                setLocationError('');
                
                if (!navigator.geolocation) {
                    setLocationError('เบราว์เซอร์ของคุณไม่รองรับการระบุตำแหน่ง (GPS)');
                    setIsLocating(false);
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        setCurrentLocation({ lat: position.coords.latitude, lng: position.coords.longitude });
                        setIsLocating(false);
                    },
                    (error) => {
                        let errorMsg = 'ไม่สามารถดึงตำแหน่งได้';
                        if (error.code === 1) errorMsg = 'กรุณาอนุญาต GPS';
                        if (error.code === 2) errorMsg = 'ไม่พบสัญญาณ GPS';
                        if (error.code === 3) errorMsg = 'หมดเวลาเชื่อมต่อ GPS';
                        setLocationError(errorMsg);
                        setIsLocating(false);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            // --- ระบบจัดการเปิดแผนที่ และ ปักหมุด ---
            useEffect(() => {
                if (showMap && mapContainerRef.current) {
                    // แก้ไขพาทรูปไอคอนหมุด
                    L.Icon.Default.imagePath = 'https://unpkg.com/leaflet@1.9.4/dist/images/';
                    
                    const map = L.map(mapContainerRef.current).setView([currentLocation.lat, currentLocation.lng], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(map);

                    const marker = L.marker([currentLocation.lat, currentLocation.lng], { draggable: true }).addTo(map);
                    selectedLatLngRef.current = { lat: currentLocation.lat, lng: currentLocation.lng };

                    marker.on('dragend', function () {
                        selectedLatLngRef.current = marker.getLatLng();
                    });

                    map.on('click', function(e) {
                        marker.setLatLng(e.latlng);
                        selectedLatLngRef.current = e.latlng;
                    });

                    // รอให้แผนที่กางเต็มจอก่อนค่อยโหลดภาพ
                    setTimeout(() => { map.invalidateSize(); }, 200);

                    return () => map.remove();
                }
            }, [showMap]);

            // เมื่อกดปุ่ม "ยืนยันตำแหน่งนี้"
            const handleConfirmMap = async () => {
                if (!selectedLatLngRef.current) return;
                const { lat, lng } = selectedLatLngRef.current;
                setShowMap(false);
                setIsCalculating(true);
                setSelectedDest({ lat, lng, name: 'พิกัดที่เลือกจากแผนที่...' });

                try {
                    // แปลงพิกัดกลับเป็นชื่อสถานที่คร่าวๆ
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=th`);
                    const data = await res.json();
                    const destName = data.display_name || 'ตำแหน่งที่ปักหมุดเอง';
                    calculateDistance(lat, lng, destName);
                } catch (e) {
                    calculateDistance(lat, lng, 'ตำแหน่งที่ปักหมุดเอง');
                }
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;

                setIsSearching(true);
                setSearchResults([]);
                setSelectedDest(null);
                setRouteInfo(null);
                setSearchMessage(''); // ล้างข้อความเก่าก่อนค้นหาใหม่

                try {
                    // --- เปลี่ยนมาระบบ Photon API เพื่อรองรับภาษาไทย และหาสถานที่ใกล้ตัวก่อน ---
                    // ส่ง lat, lon ปัจจุบันไปด้วย เพื่อให้มันโฟกัสสถานที่รอบๆ รถเราก่อน
                    let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(searchQuery)}&limit=8`;
                    if (currentLocation) {
                        url += `&lat=${currentLocation.lat}&lon=${currentLocation.lng}`;
                    }

                    const res = await fetch(url);
                    const data = await res.json();
                    
                    if (data && data.features && data.features.length > 0) {
                        const mappedResults = data.features.map(f => {
                            const p = f.properties;
                            // นำข้อมูลต่างๆ มาต่อกันเป็นชื่อสถานที่ (ชื่อ, ถนน, ตำบล/แขวง, จังหวัด)
                            const nameParts = [p.name, p.street, p.district, p.city, p.state].filter(Boolean);
                            // ตัดข้อมูลที่ซ้ำกันออก
                            const displayName = Array.from(new Set(nameParts)).join(', ');
                            
                            return {
                                lat: f.geometry.coordinates[1],
                                lon: f.geometry.coordinates[0],
                                display_name: displayName || 'สถานที่ (ไม่มีชื่อระบุ)'
                            };
                        });
                        
                        setSearchResults(mappedResults);
                    } else {
                        // กรณีหาไม่เจอ
                        setSearchMessage('ไม่พบสถานที่ ลองพิมพ์ชื่อ ตำบล, อำเภอ หรือ ถนน เพิ่มเข้าไปครับ');
                    }
                } catch (error) {
                    setSearchMessage('เกิดข้อผิดพลาดในการเชื่อมต่ออินเทอร์เน็ตเพื่อค้นหา');
                } finally {
                    setIsSearching(false);
                }
            };

            const calculateDistance = async (destLat, destLng, destName) => {
                if (!currentLocation) {
                    alert('กรุณารอ GPS ก่อน');
                    return;
                }

                setIsCalculating(true);
                setSelectedDest({ lat: destLat, lng: destLng, name: destName });
                setSearchResults([]); 

                try {
                    const start = `${currentLocation.lng},${currentLocation.lat}`;
                    const end = `${destLng},${destLat}`;
                    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${start};${end}?overview=false&alternatives=true`);
                    const data = await res.json();

                    if (data.code === 'Ok' && data.routes.length > 0) {
                        const routes = data.routes.map(r => ({
                            distance: (r.distance / 1000).toFixed(1),
                            duration: Math.round(r.duration / 60)
                        }));
                        setRouteInfo(routes);
                    } else {
                        alert('คำนวณเส้นทางไม่ได้');
                    }
                } catch (error) {
                    alert('เกิดข้อผิดพลาดตอนคำนวณ');
                } finally {
                    setIsCalculating(false);
                }
            };

            const openGoogleMaps = (avoidTolls) => {
                if (currentLocation && selectedDest) {
                    let url = `https://www.google.com/maps/dir/?api=1&origin=${currentLocation.lat},${currentLocation.lng}&destination=${selectedDest.lat},${selectedDest.lng}&travelmode=driving`;
                    if (avoidTolls) url += '&avoid=tolls';
                    window.open(url, '_blank');
                }
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-10 flex items-center gap-2">
                        <i data-lucide="car"></i>
                        <h1 className="text-xl font-bold">เช็คระยะทางคนขับ (Pro)</h1>
                    </header>

                    <main className="p-4 max-w-md mx-auto space-y-4">
                        {/* Status Card */}
                        <div className="bg-white rounded-xl shadow-sm p-4 border">
                            <div className="flex justify-between mb-2">
                                <h2 className="text-sm font-semibold text-gray-500 flex gap-1"><i data-lucide="crosshair" className="w-4 h-4"></i> ตำแหน่งของคุณ</h2>
                                <button onClick={getUserLocation} className="text-blue-600 text-sm font-bold">รีเฟรช</button>
                            </div>
                            {isLocating ? <div className="text-blue-600">กำลังจับสัญญาณ...</div> 
                            : locationError ? <div className="text-red-500">{locationError}</div> 
                            : <div className="text-green-600 font-medium flex items-center gap-2">
                                <div className="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>ระบบพร้อมใช้งาน
                              </div>}
                        </div>

                        {/* Search Card */}
                        <div className="bg-white rounded-xl shadow-sm p-4 border">
                            <h2 className="text-sm font-semibold text-gray-500 mb-3 flex gap-1"><i data-lucide="map-pin" className="w-4 h-4"></i> จุดหมาย</h2>
                            <form onSubmit={handleSearch} className="flex gap-2">
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="พิมพ์สถานที่..." className="flex-1 p-3 border rounded-lg" disabled={!currentLocation || isSearching} />
                                <button type="submit" disabled={!currentLocation || !searchQuery.trim() || isSearching} className="bg-blue-600 text-white px-4 py-3 rounded-lg">
                                    {isSearching ? '...' : <i data-lucide="search" className="w-5 h-5"></i>}
                                </button>
                            </form>
                            
                            {/* เพิ่มปุ่มสำหรับเปิดแผนที่ตรงนี้ */}
                            <div className="mt-4 text-center border-t pt-3">
                                <span className="text-sm text-gray-400 block mb-2">หรือ</span>
                                <button 
                                    onClick={() => currentLocation ? setShowMap(true) : alert('กรุณารอ GPS ตำแหน่งปัจจุบันก่อนครับ')}
                                    className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-lg border border-gray-300 flex items-center justify-center gap-2 transition-colors font-semibold"
                                >
                                    <i data-lucide="map" className="w-5 h-5 text-blue-600"></i>
                                    ปักหมุดจุดหมายจากแผนที่ด้วยตัวเอง
                                </button>
                            </div>

                            {/* แสดงข้อความเตือนเมื่อค้นหาไม่เจอ */}
                            {searchMessage && (
                                <div className="mt-3 p-3 bg-yellow-50 text-yellow-700 text-sm rounded-lg border border-yellow-200">
                                    {searchMessage}
                                </div>
                            )}

                            {searchResults.length > 0 && (
                                <div className="mt-3 border rounded-lg max-h-60 overflow-y-auto">
                                    {searchResults.map((place, i) => (
                                        <button key={i} onClick={() => calculateDistance(place.lat, place.lon, place.display_name)} className="w-full text-left p-3 hover:bg-blue-50 active:bg-blue-100 border-b text-sm transition-colors flex items-start gap-2">
                                            <i data-lucide="map-pin" className="w-4 h-4 text-gray-400 mt-0.5 shrink-0"></i>
                                            <span className="text-gray-700">{place.display_name}</span>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Results Card */}
                        {isCalculating ? <div className="text-center p-8 text-blue-500">กำลังคำนวณ...</div> 
                        : routeInfo ? (
                            <div className="bg-white rounded-xl shadow-md border overflow-hidden">
                                <div className="bg-gray-50 p-4 border-b">
                                    <p className="text-sm font-bold truncate">{selectedDest.name}</p>
                                </div>
                                <div className="p-4 space-y-3">
                                    {routeInfo.map((route, i) => (
                                        <div key={i} className={`p-3 rounded-lg border ${i === 0 ? 'bg-blue-50 border-blue-200' : ''}`}>
                                            <p className="text-sm font-bold mb-1">{i === 0 ? 'เส้นทางแนะนำ' : `ทางเลือก ${i}`}</p>
                                            <div className="flex gap-4 text-sm font-medium">
                                                <span className="text-blue-700">{route.distance} กม.</span>
                                                <span className="text-orange-600">{route.duration} นาที</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 grid grid-cols-2 gap-3 border-t">
                                    <button onClick={() => openGoogleMaps(true)} className="bg-orange-500 text-white py-3 rounded-xl font-bold">เลี่ยงทางด่วน</button>
                                    <button onClick={() => openGoogleMaps(false)} className="bg-green-600 text-white py-3 rounded-xl font-bold">ขึ้นทางด่วน</button>
                                </div>
                            </div>
                        ) : null}
                    </main>

                    {/* หน้าต่างแผนที่เต็มจอ (จะโผล่มาเมื่อกดปุ่มปักหมุด) */}
                    {showMap && (
                        <div className="fixed inset-0 z-50 bg-white flex flex-col">
                            <div className="bg-blue-700 text-white p-4 flex justify-between items-center shadow-md">
                                <h2 className="font-bold flex items-center gap-2"><i data-lucide="map-pin"></i> เลื่อนหมุดไปที่จุดหมาย</h2>
                                <button onClick={() => setShowMap(false)} className="text-white bg-blue-800 hover:bg-blue-900 px-3 py-1.5 rounded-lg font-bold">
                                    ปิด X
                                </button>
                            </div>
                            <div className="bg-yellow-50 p-2 text-center text-sm text-yellow-800 border-b border-yellow-200 shadow-inner">
                                แตะที่แผนที่ หรือ ลากหมุดสีน้ำเงิน เพื่อเลือกตำแหน่งผู้โดยสาร
                            </div>
                            
                            {/* กล่องแสดงแผนที่ Leaflet */}
                            <div ref={mapContainerRef} className="flex-1 w-full relative z-0"></div>
                            
                            <div className="p-4 bg-white border-t shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] relative z-10">
                                <button 
                                    onClick={handleConfirmMap} 
                                    className="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-md text-lg"
                                >
                                    ยืนยันตำแหน่งนี้
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
